name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build and run tests
        run: ./mvnw --batch-mode clean verify